<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1410">
<title>McGano Plex Archive</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#f5f0e8;color:#1a1410;font-family:'Playfair Display',Georgia,serif}
:root{
  --bg:#f5f0e8;--surface:#ffffff;--surface2:#f0ebe0;--surface3:#e8e0d0;
  --border:#d0c8b8;--border2:#b8ae9e;
  --text:#1a1410;--text2:#5a4e3e;--text3:#9a8e7e;
  --gold:#c8102e;--gold3:#a00820;
  --red:#c8102e;--green:#2a6e3a;
  --safe:env(safe-area-inset-bottom,0px);
  --serif:'Playfair Display',Georgia,serif;
  --mono:'Courier Prime','Courier New',monospace
}
#app{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto}
#header{background:var(--text);border-bottom:4px solid var(--gold);padding:calc(14px + env(safe-area-inset-top)) 18px 11px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#header h1{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:2px;color:#fff;text-transform:uppercase}
#header .subtitle{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
#header .stats{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:.5px}
.btn-signin{background:var(--gold);border:none;color:#fff;border-radius:0;padding:6px 14px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.btn-signout{background:none;border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.6);border-radius:0;padding:5px 10px;font-family:var(--mono);font-size:9px;cursor:pointer;letter-spacing:.5px}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
#tabbar{background:var(--text);border-top:2px solid var(--gold);display:flex;padding-bottom:var(--safe);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 9px;cursor:pointer;color:rgba(255,255,255,0.45);font-family:var(--mono);font-size:9px;letter-spacing:1.5px;gap:5px;text-transform:uppercase}
.tab svg{width:20px;height:20px}.tab.active{color:#fff}
.view{display:none;flex:1;flex-direction:column;overflow-y:auto}
.view.active{display:flex}
/* Sync bar */
.sync-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;flex-shrink:0}
.sync-left{display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.live{background:var(--green);animation:pulse 2s infinite}
.sync-dot.busy{background:var(--gold);animation:pulse .6s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-sync{background:none;border:1px solid var(--border);color:var(--text3);border-radius:0;padding:4px 10px;font-family:var(--mono);font-size:9px;cursor:pointer;letter-spacing:1px}
/* Auth banner */
#auth-banner{background:var(--surface2);border-left:4px solid var(--gold);padding:12px 16px;font-family:var(--mono);font-size:11px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
#auth-banner.hidden{display:none}
/* Search */
.searchbar{padding:12px 16px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.searchbar input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--text);padding:8px 0;color:var(--text);font-family:var(--serif);font-size:15px;outline:none}
.searchbar input::placeholder{color:var(--text3)}
/* Film list */
.film-list{padding:0 16px;border-top:1px solid var(--border);flex:1}
.film-card{background:var(--surface);border:none;border-bottom:1px solid var(--border);padding:14px 0;cursor:pointer}
.film-card:active{background:var(--surface2)}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.fc-title{font-family:var(--serif);font-size:17px;font-weight:700;line-height:1.25;flex:1;color:var(--text)}
.fc-id{font-family:var(--mono);font-size:10px;color:var(--gold);white-space:nowrap}
.fc-director{font-family:var(--mono);font-size:11px;color:var(--text3);margin:4px 0;letter-spacing:.5px}
.fc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag{font-family:var(--mono);font-size:9px;background:transparent;border:1px solid var(--border2);border-radius:20px;padding:2px 8px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.tag.rt{color:var(--gold);border-color:var(--gold)}
.tag.status-out{background:var(--gold);color:#fff;border-color:var(--gold)}
.tag.status-in{color:var(--green);border-color:var(--green)}
.empty-state{font-family:var(--mono);font-size:12px;color:var(--text3);text-align:center;padding:40px 20px;letter-spacing:1px}
/* Detail view */
#detail-view{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;max-width:900px;margin:0 auto}
#detail-view.open{display:flex}
.dp-header{background:var(--text);border-bottom:3px solid var(--gold);padding:calc(14px + env(safe-area-inset-top)) 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.dp-back{color:#fff;font-family:var(--mono);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;letter-spacing:1px;text-transform:uppercase}
.dp-header h2{font-family:var(--serif);font-size:15px;font-weight:700;flex:1;line-height:1.3;color:#fff}
#dp-body{overflow-y:auto;flex:1;padding:16px}
.dp-section{margin-bottom:20px}
.dp-section-title{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;border-bottom:2px solid var(--gold);padding-bottom:5px}
.dp-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.dp-field{background:var(--surface2);border:none;border-left:3px solid var(--border);padding:8px 11px;flex:1;min-width:120px}
.dp-field label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px}
.dp-field span{font-family:var(--serif);font-size:14px;color:var(--text)}
.dp-field span.empty{color:var(--text3);font-style:italic}
/* Reels */
.reel-item{background:var(--surface2);border:none;border-left:3px solid var(--gold);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.ri-left{flex:1}
.ri-bc{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.ri-title{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.checkout-info{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:2px}
.ri-status{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:20px}
.ri-status.in{background:transparent;color:var(--green);border:1px solid var(--green)}
.ri-status.out{background:var(--gold);color:#fff}
.btn-checkout{background:var(--text);border:none;color:#fff;border-radius:0;padding:7px 13px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px}
.btn-checkin{background:var(--green);border:none;color:#fff;border-radius:0;padding:7px 13px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px}
.btn-assign{background:none;border:1px solid var(--border);color:var(--text2);border-radius:0;padding:7px 13px;font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:.5px}
/* Modal */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
#modal-overlay.open{opacity:1;pointer-events:all}
#modal-box{background:var(--surface);border-top:4px solid var(--gold);padding:20px 18px calc(22px + var(--safe));width:100%;max-width:900px;transform:translateY(30px);transition:transform .2s;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#modal-overlay.open #modal-box{transform:translateY(0)}
#modal-box h3{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:4px;color:var(--text)}
#modal-box .modal-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:16px;letter-spacing:.5px}
.modal-form-field{margin-bottom:14px}
.modal-form-field label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
.modal-form-field input,.modal-form-field select,.modal-form-field textarea{width:100%;background:var(--surface2);border:none;border-bottom:2px solid var(--border);padding:10px 4px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
.modal-form-field input:focus{border-bottom-color:var(--gold)}
.modal-buttons{display:flex;gap:10px;margin-top:18px}
.btn-confirm{flex:1;background:var(--gold);border:none;color:#fff;padding:14px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:2px}
.btn-confirm-green{flex:1;background:var(--green);border:none;color:#fff;padding:14px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:2px}
.btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:14px;font-family:var(--mono);font-size:12px;cursor:pointer;letter-spacing:2px}
/* Scan */
.scan-wrap{padding:16px;flex:1;display:flex;flex-direction:column;gap:12px}
.manual-scan{display:flex;gap:8px}
.manual-scan input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:0;padding:12px 13px;color:var(--text);font-family:var(--mono);font-size:15px;outline:none;letter-spacing:1px}
.manual-scan button{background:var(--text);border:none;color:#fff;border-radius:0;padding:12px 16px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px}
#scan-status{font-family:var(--mono);font-size:11px;color:var(--text3);text-align:center;padding:8px 0}
.scan-result{background:var(--surface);border-top:3px solid var(--gold);padding:16px;display:none}
.scan-result h3{font-family:var(--mono);color:var(--gold);font-size:11px;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
#camera-wrap{position:relative;background:#000;border-radius:4px;overflow:hidden;display:none}
#scan-video{width:100%;max-height:240px;object-fit:cover;display:block}
/* Add film */
.add-wrap{padding:16px;flex:1;overflow-y:auto}
.add-section-title{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;border-bottom:2px solid var(--gold);padding-bottom:5px;margin-top:18px}
.autofill-row{display:flex;gap:8px;margin-bottom:12px}
.autofill-row input{flex:1;background:var(--surface);border:none;border-bottom:2px solid var(--text);padding:10px 0;font-family:var(--serif);font-size:15px;outline:none}
.btn-autofill{background:var(--text);border:none;color:#fff;border-radius:0;padding:11px 16px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;white-space:nowrap}
.autofill-result{background:var(--surface2);border-left:3px solid var(--green);padding:10px 13px;margin-bottom:12px;font-family:var(--mono);font-size:11px;color:var(--green);display:none}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-field{flex:1;min-width:140px;margin-bottom:12px}
.form-field label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--surface);border:none;border-bottom:1px solid var(--border);padding:8px 0;color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
.form-field input:focus{border-bottom-color:var(--gold)}
.btn-primary{background:var(--gold);color:#fff;border:none;padding:14px;width:100%;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;margin-top:8px}
/* Stats */
.stats-wrap{padding:16px;flex:1;overflow-y:auto}
.stat-card{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;margin-bottom:0}
.stat-card h3{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;border-bottom:2px solid var(--gold);padding-bottom:5px}
.genre-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.genre-label{font-family:var(--mono);font-size:10px;color:var(--text2);width:120px;flex-shrink:0;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.genre-bar{flex:1;height:6px;background:var(--surface3);border-radius:0}
.genre-bar-fill{height:100%;background:var(--gold)}
.genre-count{font-family:var(--mono);font-size:10px;color:var(--text3);width:25px;text-align:right}
/* Toast */
#toast{position:fixed;bottom:calc(90px + var(--safe));left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);border-top:3px solid var(--gold);padding:10px 18px;font-family:var(--mono);font-size:11px;color:#fff;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:300}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Reel assign */
.reel-assign-item{background:var(--surface2);border-left:3px solid var(--border2);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.rai-label{font-family:var(--mono);font-size:11px;color:var(--text2);font-weight:700}
.rai-bc{font-family:var(--mono);font-size:11px;color:var(--text3)}
.btn-scan-assign{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:0;padding:7px 12px;font-family:var(--mono);font-size:10px;cursor:pointer;white-space:nowrap}
.btn-scan-assign.assigned{background:var(--green);border-color:var(--green);color:#fff}

</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div><h1>McGano Plex</h1><div class="subtitle">16mm Film Archive</div></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="stats" id="header-stats">160 films</span>
      <button class="btn-signin" id="btn-signin" onclick="signIn()">&#9654; SIGN IN</button>
      <button class="btn-signout" id="btn-signout" onclick="signOut()" style="display:none">Sign Out</button>
    </div>
  </div>
  <div id="content">
    <!-- Archive -->
    <div id="collection-view" class="view active">
      <div class="sync-bar">
        <div class="sync-left"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Loading&hellip;</span></div>
        <button class="btn-sync" onclick="loadFromSheet()">&#8635; Refresh</button>
      </div>
      <div id="auth-banner" class="hidden">
        <span>Sign in with Google to sync changes back to your Sheet.</span>
        <button class="btn-signin" onclick="signIn()">SIGN IN</button>
      </div>
      <div class="searchbar"><input type="text" id="search-input" placeholder="SEARCH TITLE, DIRECTOR, GENRE&hellip;" oninput="renderFilmList(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"></div>
      <div class="film-list" id="film-list"></div>
    </div>
    <!-- Scan -->
    <div id="scanner-view" class="view">
      <div class="scan-wrap">
        <div style="font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid var(--gold);padding-bottom:5px;margin-bottom:12px">Scan Barcode</div>
        <div class="manual-scan">
          <input type="text" id="manual-bc-input" placeholder="SCAN OR TYPE BARCODE&hellip;" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onScanInput(this.value)">
          <button onclick="submitManualScan()">SCAN</button>
        </div>
        <div id="scan-status"><p style="font-family:var(--mono);font-size:11px;color:var(--text3)">Tera scanner ready &mdash; scan any barcode<br><br><button onclick="initCamera()" style="margin-top:6px;background:var(--text);border:none;color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;padding:10px 20px;cursor:pointer;letter-spacing:1px">USE CAMERA</button></p></div>
        <div id="camera-wrap"><video id="scan-video" playsinline autoplay muted></video></div>
        <div id="scan-result" class="scan-result"></div>
      </div>
    </div>
    <!-- Add Film -->
    <div id="add-view" class="view">
      <div class="add-wrap">
        <div class="add-section-title" style="margin-top:0">Auto-Fill from TMDB</div>
        <div class="autofill-row">
          <input type="text" id="add-title-search" placeholder="Search title&hellip;" autocomplete="off">
          <button class="btn-autofill" onclick="autoFill()">&#9654; AUTO-FILL</button>
        </div>
        <div class="autofill-result" id="autofill-result"></div>
        <div class="add-section-title">Film Details</div>
        <div class="form-field"><label>Title *</label><input type="text" id="add-title" autocomplete="off"></div>
        <div class="form-row">
          <div class="form-field"><label>Director</label><input type="text" id="add-director" autocomplete="off"></div>
          <div class="form-field"><label>Year</label><input type="number" id="add-year" min="1880" max="2030"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Genre</label><input type="text" id="add-genre" autocomplete="off"></div>
          <div class="form-field"><label>RT Score</label><input type="text" id="add-rt" autocomplete="off"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Distributor</label><input type="text" id="add-distributor" autocomplete="off"></div>
          <div class="form-field"><label>Language</label><input type="text" id="add-language" autocomplete="off"></div>
        </div>
        <div class="add-section-title">Physical</div>
        <div class="form-row">
          <div class="form-field"><label>Film Stock</label><input type="text" id="add-stock" autocomplete="off"></div>
          <div class="form-field"><label>Aspect Ratio</label><input type="text" id="add-ar" autocomplete="off"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Number of Reels</label><input type="number" id="add-reelcount" min="1" max="20" value="2"></div>
          <div class="form-field"><label>Year Obtained</label><input type="number" id="add-yearobtained" min="1950" max="2030"></div>
        </div>
        <div class="form-field"><label>Inspection Notes</label><textarea id="add-inspect" rows="2" style="resize:none"></textarea></div>
        <div class="form-field"><label>Notes</label><textarea id="add-notes" rows="2" style="resize:none"></textarea></div>
        <div class="add-section-title">Reel Barcodes <span style="font-size:8px;color:var(--text3);letter-spacing:1px">(OPTIONAL)</span></div>
        <div id="reel-assign-list"></div>
        <button class="btn-primary" onclick="saveFilm()">&#43; ADD TO ARCHIVE</button>
      </div>
    </div>
    <!-- Stats -->
    <div id="stats-view" class="view">
      <div class="stats-wrap" id="stats-content"></div>
    </div>
  </div>
  <div id="tabbar">
    <div class="tab active" onclick="switchTab('collection-view',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      ARCHIVE
    </div>
    <div class="tab" onclick="switchTab('scanner-view',this);focusScanInput()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 7V4h3M17 4h3v3M4 17v3h3M17 20h3v-3M7 10h10M7 12h10M7 14h10"/></svg>
      SCAN
    </div>
    <div class="tab" onclick="switchTab('add-view',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      ADD FILM
    </div>
    <div class="tab" onclick="switchTab('stats-view',this);renderStats()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      STATS
    </div>
  </div>
</div>
<!-- Detail view -->
<div id="detail-view">
  <div class="dp-header">

let DB={features:[],reels:[]};
let filteredFeatures=[];
let currentDetailFilm=null;
let tokenClient=null,accessToken=null,tokenExpiry=0;
let modalAction=null,modalReel=null;
let POSTER_CACHE={};
let scanBuffer='',scanTimer=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSyncStatus(state,msg){document.getElementById('sync-dot').className='sync-dot '+state;document.getElementById('sync-label').textContent=msg;}
function isAuthed(){return!!accessToken&&Date.now()<tokenExpiry;}
function updateHeaderStats(){
  const rc=DB.reels.length,out=DB.reels.filter(r=>r.status!=='IN ARCHIVE').length;
  let s=DB.features.length+' films';
  if(rc>0)s+=' \u00b7 '+rc+' reels';
  if(out>0)s+=' \u00b7 '+out+' out';
  document.getElementById('header-stats').textContent=s;
}
function switchTab(viewId,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  el.classList.add('active');
}
function focusScanInput(){setTimeout(()=>{const i=document.getElementById('manual-bc-input');if(i)i.focus();},150);}
function render(){renderFilmList();updateHeaderStats();}
function renderFilmList(query){
  const q=(query||'').toLowerCase().trim();
  filteredFeatures=q?DB.features.filter(f=>
    (f.title||'').toLowerCase().includes(q)||
    (f.director||'').toLowerCase().includes(q)||
    (f.genre||'').toLowerCase().includes(q)||
    (f.year||'').includes(q)
  ):[...DB.features];
  const c=document.getElementById('film-list');
  if(!filteredFeatures.length){c.innerHTML='<div class="empty-state">No films found</div>';return;}
  c.innerHTML='';
  function renderChunk(start){
    const chunk=filteredFeatures.slice(start,start+20);
    if(!chunk.length)return;
    // Use data-id attribute instead of inline onclick to avoid quote escaping
    const frag=document.createDocumentFragment();
    chunk.forEach(f=>{
      const reels=DB.reels.filter(r=>r.filmTitle===f.title);
      const rc=reels.length;
      const outCount=reels.filter(r=>r.status!=='IN ARCHIVE').length;
      const stag=outCount>0
        ? '<span class="tag status-out">'+outCount+' REEL'+(outCount>1?'S':'')+' OUT</span>'
        : '<span class="tag status-in">IN ARCHIVE</span>';
      const posterHtml=''; // No poster on list view
      const genres=f.genre?f.genre.split(',').slice(0,2).map(g=>'<span class="tag">'+esc(g.trim())+'</span>').join(''):'';
      const rt=f.rtScore?'<span class="tag rt">&#127813; '+esc(f.rtScore)+'</span>':'';
      const reelTag=rc?'<span class="tag">'+rc+' reel'+(rc>1?'s':'')+'</span>':'';
      const div=document.createElement('div');
      div.className='film-card';
      div.dataset.id=f.id;
      div.innerHTML='<div style="display:flex;align-items:flex-start">'+posterHtml
        +'<div style="flex:1;min-width:0">'
        +'<div class="fc-top"><div class="fc-title">'+esc(f.title)+'</div></div>'
        +'<div class="fc-director">'+(f.director||'\u2014')+' \u00b7 '+(f.year||'\u2014')+'</div>'
        +'<div class="fc-meta">'+genres+rt+reelTag+stag+'</div>'
        +'</div></div>';
      div.addEventListener('click',()=>openDetail(f.id));
      frag.appendChild(div);
    });
    c.appendChild(frag);
    if(start+20<filteredFeatures.length)setTimeout(()=>renderChunk(start+20),0);
  }
  renderChunk(0);
}

function cv(row,i){return row&&row[i]&&row[i].v!=null?String(row[i].v).trim():'';}
function parseFeatures(json){
  return (json.table?json.table.rows:[]).map((row,i)=>{
    try{
      const title=cv(row,0);if(!title)return null;
      return{id:cv(row,24)||('16MM-'+String(i+1).padStart(4,'0')),title,distributor:cv(row,1),year:cv(row,2),language:cv(row,3),genre:cv(row,4),director:cv(row,5),rtScore:cv(row,7),filmStock:cv(row,8),format:cv(row,9),color:cv(row,10),reels:cv(row,11),aspectRatio:cv(row,12),canned:cv(row,14),yearObtained:cv(row,15),serviced:cv(row,16),inspectionNotes:cv(row,17),notes:cv(row,18),previousCollector:cv(row,19),priceBought:cv(row,20),screened:cv(row,21),highestSold:cv(row,22),posterUrl:cv(row,30),status:cv(row,25)||'IN ARCHIVE',checkedOutTo:cv(row,26),dateOut:cv(row,27),dateIn:cv(row,28),scanNotes:cv(row,29)};
    }catch(e){return null;}
  }).filter(Boolean);
}
function parseReels(json){
  return (json.table?json.table.rows:[]).map(row=>{
    try{const ft=cv(row,1);if(!ft)return null;return{barcodeId:cv(row,0),filmTitle:ft,reelNum:cv(row,2)||'1',status:cv(row,3)||'IN ARCHIVE',checkedOutTo:cv(row,4),dateOut:cv(row,5),dateIn:cv(row,6),phoneEmail:cv(row,7),notes:cv(row,8)};}
    catch(e){return null;}
  }).filter(Boolean);
}
async function loadFromSheet(){
  setSyncStatus('busy','Syncing\u2026');
  try{
    const [fRes,rRes]=await Promise.all([
      fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet=Features'),
      fetch('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet=Reel%20Tracker')
    ]);
    const fJ=JSON.parse((await fRes.text()).match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rJ=JSON.parse((await rRes.text()).match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const fresh=parseFeatures(fJ),freshR=parseReels(rJ);
    if(fresh.length>0){
      fresh.forEach(f=>{if(f.posterUrl)POSTER_CACHE[f.id]=f.posterUrl;});
      DB.features=fresh;DB.reels=freshR;render();
    }
    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    setSyncStatus('live',DB.features.length+' films \u00b7 synced '+now);
    fetchPostersInBackground();
  }catch(e){setSyncStatus('error','Sheet unavailable');console.warn('Sheet sync:',e.message);}
}
function showSignedIn(){document.getElementById('btn-signin').style.display='none';document.getElementById('btn-signout').style.display='block';document.getElementById('auth-banner').classList.add('hidden');}
function showSignedOut(){document.getElementById('btn-signin').style.display='block';document.getElementById('btn-signout').style.display='none';document.getElementById('auth-banner').classList.remove('hidden');}
function loadGoogleAuth(){const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';s.onload=initAuth;s.onerror=()=>showSignedOut();document.body.appendChild(s);}
function initAuth(){
  tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:onToken});
  const tok=localStorage.getItem('mp_token'),exp=parseInt(localStorage.getItem('mp_expiry')||'0');
  if(tok&&Date.now()<exp){accessToken=tok;tokenExpiry=exp;showSignedIn();}
  else showSignedOut();
}
function onToken(resp){
  if(resp.error){showSignedOut();return;}
  accessToken=resp.access_token;tokenExpiry=Date.now()+(resp.expires_in-60)*1000;
  localStorage.setItem('mp_token',accessToken);localStorage.setItem('mp_expiry',String(tokenExpiry));
  showSignedIn();loadFromSheet();
}
function signIn(){if(tokenClient)tokenClient.requestAccessToken({prompt:''});}
function signOut(){accessToken=null;tokenExpiry=0;localStorage.removeItem('mp_token');localStorage.removeItem('mp_expiry');showSignedOut();showToast('Signed out');}

function matchBarcode(bc,code){if(!bc||!bc.trim())return false;return bc.toUpperCase()===code.toUpperCase()||bc.replace(/^0+/,'')===code.replace(/^0+/,'');}

async function writeCheckoutToSheet(reel){
  if(!isAuthed())return;
  try{
    const data=await sheetsGet('Reel Tracker!A2:I'),rows=data.values||[];
    const idx=rows.findIndex(r=>r[0]===reel.barcodeId&&r[1]===reel.filmTitle&&r[2]===String(reel.reelNum));
    const row=[reel.barcodeId,reel.filmTitle,String(reel.reelNum),reel.status,reel.checkedOutTo||'',reel.dateOut||'',reel.dateIn||'',reel.phoneEmail||'',reel.notes||''];
    if(idx>=0)await sheetsUpdate('Reel Tracker!A'+(idx+2)+':I'+(idx+2),[row]);
    else await sheetsAppend('Reel Tracker!A2:I',[row]);
  }catch(e){console.warn('Checkout sheet write:',e.message);}
}

function lookupBarcode(code){
  if(!code||!code.trim())return;
  code=code.trim();
  const el=document.getElementById('scan-result');el.style.display='block';
  const matched=DB.reels.filter(r=>matchBarcode(r.barcodeId,code));
  if(matched.length>0){
    const allOut=matched.every(r=>r.status!=='IN ARCHIVE');
    const film=DB.features.find(f=>f.title===matched[0].filmTitle);
    el.innerHTML='<h3>&#9632; '+(matched.length>1?matched.length+' Reels Found':'Reel Found')+'</h3>'
      +'<div style="font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:4px">'+esc(code)+'</div>'
      +'<div style="font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:8px">'+esc(matched[0].filmTitle)+'</div>'
      +(matched.length>1?'<div style="font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:8px">'+matched.length+' reels share this barcode</div>':'')
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
      +matched.map(r=>'<span class="tag">Reel '+r.reelNum+'</span>').join('')
      +(allOut?'<span class="tag status-out">OUT</span>':'<span class="tag status-in">IN ARCHIVE</span>')
      +'</div>'
      +'<div style="display:flex;gap:8px">'
      +(!allOut
        ? '<button class="btn-checkout" style="flex:1;padding:12px" data-bc="'+esc(code)+'" onclick="checkOutAll(this.dataset.bc)">CHECK OUT'+(matched.length>1?' ALL':'')+'</button>'
        : '<button class="btn-checkin" style="flex:1;padding:12px" data-bc="'+esc(code)+'" onclick="checkInAll(this.dataset.bc)">CHECK IN'+(matched.length>1?' ALL':'')+'</button>')
      +(film?'<button style="flex:1;padding:12px;background:var(--surface2);color:var(--text);border:none;font-family:var(--mono);font-size:10px;cursor:pointer" data-fid="'+esc(film.id)+'" onclick="closeDetail();document.querySelector(\'.tab\').click();openDetail(this.dataset.fid)">VIEW FILM</button>':'')
      +'</div>';
    document.getElementById('scan-status').innerHTML='<p style="color:var(--green)">\u2713 '+matched.length+' reel'+(matched.length>1?'s':'')+' found</p>';
  }else{
    el.innerHTML='<h3 style="color:var(--red)">Not Found</h3><div style="font-family:var(--mono);font-size:11px;color:var(--text2)">'+esc(code)+'</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px">Not assigned in archive.</div>';
    document.getElementById('scan-status').innerHTML='<p style="color:var(--red)">No match found</p>';
  }

      },300);

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');modalAction=null;}
function confirmModal(){
  const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(modalAction==='checkout-all'||modalAction==='checkin-all'){
    const reels=window._coReels||[];
    const notes=(document.getElementById('modal-notes')?.value||'').trim();
    if(modalAction==='checkout-all'){
      const name=(document.getElementById('modal-name')?.value||'').trim();
      if(!name){showToast('\u26a0 Enter a name');return;}
      reels.forEach(r=>{r.status='CHECKED OUT';r.checkedOutTo=name;r.dateOut=today;r.dateIn='';if(notes)r.notes=notes;writeCheckoutToSheet(r);});
      showToast('\u2713 '+reels.length+' reel'+(reels.length>1?'s':'')+' checked out to '+name);
    }else{
      reels.forEach(r=>{r.status='IN ARCHIVE';r.dateIn=today;r.checkedOutTo='';r.dateOut='';if(notes)r.notes=notes;writeCheckoutToSheet(r);});
      showToast('\u2713 Checked in');
    }
    closeModal();updateHeaderStats();renderFilmList(document.getElementById('search-input').value);
    if(currentDetailFilm)openDetail(currentDetailFilm.id);
    if(reels[0])lookupBarcode(reels[0].barcodeId);
    return;
  }
  if(modalAction==='create-reels'){
    const filmId=document.getElementById('modal-confirm-btn').dataset.filmId;
    const count=parseInt(document.getElementById('modal-confirm-btn').dataset.count)||1;
    const offset=parseInt(document.getElementById('modal-confirm-btn').dataset.offset)||0;
    const film=DB.features.find(f=>f.id===filmId);if(!film){closeModal();return;}
    const newReels=[];
    for(let i=1;i<=count;i++){
      const reelNum=offset+i;
      const bc=(document.getElementById('reel-assign-'+reelNum)?.value||'').trim();
      if(bc&&DB.reels.find(r=>r.barcodeId&&r.barcodeId.toUpperCase()===bc.toUpperCase())){showToast('\u26a0 Barcode '+bc+' already in use');return;}
      const reel={barcodeId:bc,filmTitle:film.title,reelNum:String(reelNum),status:'IN ARCHIVE',checkedOutTo:'',dateOut:'',dateIn:'',phoneEmail:'',notes:''};
      DB.reels.push(reel);newReels.push(reel);
    }
    closeModal();render();openDetail(filmId);showToast('\u2713 '+count+' reel'+(count>1?'s':'')+' added');
    if(isAuthed()&&newReels.length)sheetsAppend('Reel Tracker!A2:I',newReels.map(r=>[r.barcodeId,r.filmTitle,r.reelNum,r.status,'','','','',''])).catch(()=>{});
    return;
  }
  if(modalAction==='edit'){
    const filmId=document.getElementById('modal-confirm-btn').dataset.filmId;
    const film=DB.features.find(f=>f.id===filmId);if(!film){closeModal();return;}
    ['director','year','genre','rt','stock','format','color','ar','reels','canned','serviced','obtained','inspect','notes'].forEach(k=>{
      const el=document.getElementById('edit-'+k);if(!el)return;
      const v=el.value.trim();
      const map={director:'director',year:'year',genre:'genre',rt:'rtScore',stock:'filmStock',format:'format',color:'color',ar:'aspectRatio',reels:'reels',canned:'canned',serviced:'serviced',obtained:'yearObtained',inspect:'inspectionNotes',notes:'notes'};
      film[map[k]]=(['year','rt','ar','obtained'].includes(k)?v:v.toUpperCase());
    });
    const reelCount=parseInt(document.getElementById('modal-confirm-btn').dataset.reelCount)||0;
    const newReels=[];
    for(let i=1;i<=reelCount;i++){
      const bc=(document.getElementById('edit-reel-'+i)?.value||'').trim();
      const ex=DB.reels.find(r=>r.filmTitle===film.title&&String(r.reelNum)===String(i));
      if(ex){ex.barcodeId=bc||ex.barcodeId;newReels.push(ex);}
      else{const nr={barcodeId:bc,filmTitle:film.title,reelNum:String(i),status:'IN ARCHIVE',checkedOutTo:'',dateOut:'',dateIn:'',phoneEmail:'',notes:''};DB.reels.push(nr);newReels.push(nr);}
    }
    closeModal();render();openDetail(filmId);showToast('\u2713 '+film.title+' updated');
    if(isAuthed()){writeEditToSheet(film);newReels.forEach(r=>writeCheckoutToSheet(r).catch(()=>{}));}
    return;
  }
}

  const existingReels=DB.reels.filter(r=>r.filmTitle===film.title);

  }

  document.getElementById('modal-sub').textContent=film.title;

    '<div style="font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid var(--gold);padding-bottom:5px;margin-bottom:12px">Film Details</div>'
    +'<div class="modal-form-field"><label>Director</label><input type="text" id="edit-director" value="'+esc(film.director||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Year</label><input type="text" id="edit-year" value="'+esc(film.year||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Genre</label><input type="text" id="edit-genre" value="'+esc(film.genre||'')+'" autocomplete="off"></div>'

    +'<div class="modal-form-field"><label>Film Stock</label><input type="text" id="edit-stock" value="'+esc(film.filmStock||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Format</label><input type="text" id="edit-format" value="'+esc(film.format||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Color</label><input type="text" id="edit-color" value="'+esc(film.color||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Aspect Ratio</label><input type="text" id="edit-ar" value="'+esc(film.aspectRatio||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Reels</label><input type="text" id="edit-reels" value="'+esc(film.reels||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Canned</label><input type="text" id="edit-canned" value="'+esc(film.canned||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Serviced</label><input type="text" id="edit-serviced" value="'+esc(film.serviced||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Year Obtained</label><input type="text" id="edit-obtained" value="'+esc(film.yearObtained||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Inspection Notes</label><input type="text" id="edit-inspect" value="'+esc(film.inspectionNotes||'')+'" autocomplete="off"></div>'
    +'<div class="modal-form-field"><label>Notes</label><input type="text" id="edit-notes" value="'+esc(film.notes||'')+'" autocomplete="off"></div>'

    +reelRows;
  document.getElementById('modal-confirm-btn').className='btn-confirm';
  document.getElementById('modal-confirm-btn').textContent='SAVE CHANGES';

}
async function writeEditToSheet(film){
  try{
    const data=await sheetsGet('Features!A2:A'),rows=data.values||[];
    const idx=rows.findIndex(r=>r[0]&&r[0].toUpperCase()===film.title.toUpperCase());
    if(idx===-1)return;
    await sheetsUpdate('Features!A'+(idx+2)+':AD'+(idx+2),[[film.title,film.distributor,film.year,film.language,film.genre,film.director,'',film.rtScore,film.filmStock,film.format,film.color,film.reels,film.aspectRatio,'',film.canned,film.yearObtained,film.serviced,film.inspectionNotes,film.notes,film.previousCollector||'',film.priceBought||'',film.screened||'','','','',film.status,film.checkedOutTo||'',film.dateOut||'',film.dateIn||'',film.scanNotes||'']]);
  }catch(e){console.warn('Edit sheet write:',e.message);}
}
function createReelsForFilm(filmId){
  const film=DB.features.find(f=>f.id===filmId);if(!film)return;
  const countEl=document.getElementById('detail-reel-count');
  const count=parseInt(countEl?countEl.value:2)||2;
  const offset=DB.reels.filter(r=>r.filmTitle===film.title).length;
  let html='';
  for(let i=1;i<=count;i++){
    html+='<div class="modal-form-field"><label>Reel '+(offset+i)+' Barcode <span style="color:var(--text3)">(optional)</span></label><input type="text" id="reel-assign-'+(offset+i)+'" placeholder="Scan or leave blank" autocomplete="off" autocorrect="off" spellcheck="false"></div>';
  }
  html+='<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px">Leave blank to add reel without barcode.</div>';
  document.getElementById('modal-title').textContent='Assign Reel Barcodes';
  document.getElementById('modal-sub').textContent=film.title;
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-confirm-btn').className='btn-confirm';
  document.getElementById('modal-confirm-btn').textContent='SAVE REELS';
  document.getElementById('modal-confirm-btn').dataset.filmId=filmId;
  document.getElementById('modal-confirm-btn').dataset.count=count;
  document.getElementById('modal-confirm-btn').dataset.offset=offset;
  modalAction='create-reels';openModal();
  setTimeout(()=>document.getElementById('reel-assign-'+(offset+1))?.focus(),300);
}
function assignBarcodePrompt(filmId,reelNum){
  const bc=prompt('Scan or type barcode for Reel '+reelNum+':');
  if(!bc||!bc.trim())return;
  const code=bc.trim();
  const inUse=DB.reels.find(r=>r.barcodeId&&r.barcodeId.toUpperCase()===code.toUpperCase());
  if(inUse){showToast('\u26a0 '+code+' already used by '+inUse.filmTitle);return;}
  const film=DB.features.find(f=>f.id===filmId);if(!film)return;
  const reel=DB.reels.find(r=>r.filmTitle===film.title&&String(r.reelNum)===String(reelNum));
  if(!reel){showToast('\u26a0 Reel not found');return;}
  reel.barcodeId=code;showToast('\u2713 Reel '+reelNum+' assigned: '+code);
  writeCheckoutToSheet(reel);openDetail(filmId);
}
function cleanTitle(t){return t.replace(/\s*\(COPY [A-Z]\)/gi,'').replace(/\s*\([^)]*SUBTITLES?[^)]*\)/gi,'').replace(/,\s*THE$/i,'').trim();}
async function autoFill(){
  const raw=document.getElementById('add-title-search').value.trim();if(!raw)return;
  const btn=document.querySelector('.btn-autofill');btn.textContent='Searching\u2026';
  try{
    const r=await fetch('https://api.themoviedb.org/3/search/movie?api_key='+TMDB_KEY+'&query='+encodeURIComponent(cleanTitle(raw)));
    const data=await r.json();const m=data.results&&data.results[0];
    if(!m){document.getElementById('autofill-result').style.display='block';document.getElementById('autofill-result').textContent='No results';return;}
    const dd=await (await fetch('https://api.themoviedb.org/3/movie/'+m.id+'?api_key='+TMDB_KEY+'&append_to_response=credits')).json();
    document.getElementById('add-title').value=(dd.title||m.title||'').toUpperCase();
    document.getElementById('add-year').value=dd.release_date?dd.release_date.split('-')[0]:'';
    const dir=dd.credits&&dd.credits.crew&&dd.credits.crew.find(c=>c.job==='Director');
    if(dir)document.getElementById('add-director').value=dir.name.toUpperCase();
    const genres=dd.genres&&dd.genres.map(g=>g.name.toUpperCase()).join(', ');
    if(genres)document.getElementById('add-genre').value=genres;
    document.getElementById('autofill-result').style.display='block';
    document.getElementById('autofill-result').textContent='\u2713 Filled: '+(dd.title||m.title);
  }catch(e){document.getElementById('autofill-result').textContent='Error: '+e.message;}
  finally{btn.textContent='\u25ba AUTO-FILL';}
}
function saveFilm(){
  const title=(document.getElementById('add-title').value||'').trim().toUpperCase();
  if(!title){showToast('\u26a0 Title required');return;}
  const maxId=DB.features.reduce((m,f)=>{const n=parseInt((f.id||'').replace('16MM-',''));return n>m?n:m;},0);
  const newId='16MM-'+String(maxId+1).padStart(4,'0');
  const film={id:newId,title,distributor:(document.getElementById('add-distributor').value||'').trim().toUpperCase(),year:(document.getElementById('add-year').value||'').trim(),language:(document.getElementById('add-language').value||'').trim().toUpperCase(),genre:(document.getElementById('add-genre').value||'').trim().toUpperCase(),director:(document.getElementById('add-director').value||'').trim().toUpperCase(),rtScore:(document.getElementById('add-rt').value||'').trim(),filmStock:(document.getElementById('add-stock').value||'').trim().toUpperCase(),aspectRatio:(document.getElementById('add-ar').value||'').trim(),yearObtained:(document.getElementById('add-yearobtained').value||'').trim(),inspectionNotes:(document.getElementById('add-inspect').value||'').trim().toUpperCase(),notes:(document.getElementById('add-notes').value||'').trim().toUpperCase(),status:'IN ARCHIVE',checkedOutTo:'',dateOut:'',dateIn:''};
  const reelCount=parseInt(document.getElementById('add-reelcount').value)||1;
  const newReels=[];
  for(let i=1;i<=reelCount;i++){
    const bc=(document.getElementById('reel-assign-'+i)?.value||'').trim();
    newReels.push({barcodeId:bc,filmTitle:title,reelNum:String(i),status:'IN ARCHIVE',checkedOutTo:'',dateOut:'',dateIn:'',phoneEmail:'',notes:''});
  }
  DB.features.push(film);DB.reels.push(...newReels);render();showToast('\u2713 '+title+' added');
  ['add-title','add-title-search','add-director','add-year','add-genre','add-rt','add-distributor','add-language','add-stock','add-ar','add-inspect','add-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('add-reelcount').value=2;document.getElementById('autofill-result').style.display='none';document.getElementById('reel-assign-list').innerHTML='';
  if(isAuthed()){
    sheetsAppend('Features!A2:AD',[[title,film.distributor,film.year,film.language,film.genre,film.director,'',film.rtScore,film.filmStock,'','','','','','','',film.yearObtained,'','',film.inspectionNotes,film.notes,'','','',newId,'IN ARCHIVE','','','','']]).catch(()=>{});
    if(newReels.length)sheetsAppend('Reel Tracker!A2:I',newReels.map(r=>[r.barcodeId,title,r.reelNum,'IN ARCHIVE','','','','',''])).catch(()=>{});
  }
}
function renderStats(){
  const genres={},decades={};
  DB.features.forEach(f=>{
    (f.genre||'').split(',').forEach(g=>{const t=g.trim().toUpperCase();if(t)genres[t]=(genres[t]||0)+1;});
    const dec=f.year?Math.floor(parseInt(f.year)/10)*10:0;if(dec)decades[dec]=(decades[dec]||0)+1;
  });
  const out=DB.reels.filter(r=>r.status!=='IN ARCHIVE').length;
  const topG=Object.entries(genres).sort((a,b)=>b[1]-a[1]).slice(0,10),maxG=topG[0]?topG[0][1]:1;
  const topD=Object.entries(decades).sort((a,b)=>a[0]-b[0]),maxD=topD[0]?Math.max(...topD.map(x=>x[1])):1;
  document.getElementById('stats-content').innerHTML=
    '<div class="stat-card"><h3>Overview</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
    +'<div style="font-family:var(--mono);font-size:11px;color:var(--text2)">Total Films<br><span style="font-family:var(--serif);font-size:28px;font-weight:700;color:var(--text)">'+DB.features.length+'</span></div>'
    +'<div style="font-family:var(--mono);font-size:11px;color:var(--text2)">Total Reels<br><span style="font-family:var(--serif);font-size:28px;font-weight:700;color:var(--text)">'+DB.reels.length+'</span></div>'
    +'<div style="font-family:var(--mono);font-size:11px;color:var(--text2)">Checked Out<br><span style="font-family:var(--serif);font-size:28px;font-weight:700;color:var(--red)">'+out+'</span></div>'
    +'<div style="font-family:var(--mono);font-size:11px;color:var(--text2)">In Archive<br><span style="font-family:var(--serif);font-size:28px;font-weight:700;color:var(--green)">'+(DB.reels.length-out)+'</span></div>'
    +'</div></div>'
    +'<div class="stat-card"><h3>Top Genres</h3>'+topG.map(([g,c])=>'<div class="genre-row"><div class="genre-label">'+esc(g)+'</div><div class="genre-bar"><div class="genre-bar-fill" style="width:'+Math.round(c/maxG*100)+'%"></div></div><div class="genre-count">'+c+'</div></div>').join('')+'</div>'
    +'<div class="stat-card"><h3>By Decade</h3>'+topD.map(([dec,c])=>'<div class="genre-row"><div class="genre-label">'+dec+'s</div><div class="genre-bar"><div class="genre-bar-fill" style="width:'+Math.round(c/maxD*100)+'%"></div></div><div class="genre-count">'+c+'</div></div>').join('')+'</div>';
}
async function getPoster(film){
  const t=cleanTitle(film.title),y=film.year;
  const strategies=[
    ()=>fetch('https://api.themoviedb.org/3/search/movie?api_key='+TMDB_KEY+'&query='+encodeURIComponent(t)+'&year='+y).then(r=>r.json()).then(d=>{const m=d.results&&(d.results.find(x=>x.title&&x.title.toUpperCase()===t.toUpperCase())||d.results[0]);return m&&m.poster_path?TMDB_IMG+'w500'+m.poster_path:null;}),
    ()=>fetch('https://api.themoviedb.org/3/search/movie?api_key='+TMDB_KEY+'&query='+encodeURIComponent(t)).then(r=>r.json()).then(d=>{const m=d.results&&d.results[0];return m&&m.poster_path?TMDB_IMG+'w500'+m.poster_path:null;}),
    ()=>fetch('https://www.omdbapi.com/?apikey='+OMDB_KEY+'&t='+encodeURIComponent(t)+'&y='+y+'&type=movie').then(r=>r.json()).then(d=>d.Poster&&d.Poster!=='N/A'?d.Poster:null),
    ()=>fetch('https://www.omdbapi.com/?apikey='+OMDB_KEY+'&t='+encodeURIComponent(t)+'&type=movie').then(r=>r.json()).then(d=>d.Poster&&d.Poster!=='N/A'?d.Poster:null),
  ];
  for(const s of strategies){try{const p=await s();if(p)return p;}catch(e){}}return null;
}
async function fetchPostersInBackground(){
  const missing=DB.features.filter(f=>!POSTER_CACHE[f.id]).slice(0,30);
  for(const film of missing){
    const p=await getPoster(film);
    if(p)POSTER_CACHE[film.id]=p;
    await new Promise(r=>setTimeout(r,150));
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('add-yearobtained').value=new Date().getFullYear();
  document.getElementById('add-reelcount').addEventListener('input',function(){
    const n=parseInt(this.value)||0,list=document.getElementById('reel-assign-list');
    list.innerHTML='';
    for(let i=1;i<=n;i++){
      const div=document.createElement('div');div.className='reel-assign-item';
      div.innerHTML='<div class="rai-label">Reel '+i+'</div><div class="rai-bc" id="reel-bc-'+i+'"><span style="color:var(--text3);font-style:italic">Optional</span></div><input type="text" id="reel-assign-'+i+'" placeholder="Scan barcode..." autocomplete="off" style="flex:1;background:var(--surface2);border:none;border-bottom:1px solid var(--border);padding:6px 4px;font-family:var(--mono);font-size:12px;outline:none">';
      list.appendChild(div);
    }
  });
  showSignedOut();
  DB.features=SEED_FEATURES;
  DB.reels=SEED_REELS;
  requestAnimationFrame(()=>{renderFilmList();updateHeaderStats();});
  setTimeout(loadFromSheet,500);
  setTimeout(loadGoogleAuth,1500);
});
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
}
